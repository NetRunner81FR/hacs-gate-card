###############################################################################
# Example HA package - Gate Card alert entity
#
# This package creates the binary_sensor required for the alert_entity field
# of custom:portail-badge. It also includes optional automations that send
# notifications when a gate or garage stays open too long.
#
# CUSTOMIZE: replace the entity IDs below with yours.
#   YOUR_CONTACT_SENSOR   -> e.g. binary_sensor.gate_contact
#   YOUR_GARAGE_COVER     -> e.g. cover.garage (for garage-cover-card users)
#   YOUR_ALERT_DURATION   -> minutes before alert triggers (default: 30)
#
# OPTIONAL NOTIFICATIONS: the automation section requires the
# notifications_manager integration:
#   https://github.com/NetRunner81FR/ha-notifications-manager
# Remove or comment out the automation section if you do not use it.
###############################################################################

########################
# TEMPLATE SENSORS
########################
template:
  # binary_sensor.gate_open_alert
  # Active when the contact sensor has been open for >= YOUR_ALERT_DURATION min.
  # Use this entity as alert_entity in custom:portail-badge.
  - binary_sensor:
      - name: "Gate Open Alert"
        unique_id: gate_open_alert
        device_class: problem
        state: >-
          {% set contact = states('binary_sensor.YOUR_CONTACT_SENSOR') %}
          {% if contact == 'on' %}
            {% set delta = (now() - states.binary_sensor.YOUR_CONTACT_SENSOR.last_changed).total_seconds() %}
            {{ delta >= (YOUR_ALERT_DURATION * 60) }}
          {% else %}
            false
          {% endif %}


########################
# AUTOMATIONS (optional - requires notifications_manager)
# https://github.com/NetRunner81FR/ha-notifications-manager
########################
automation:
  - id: gate_open_too_long
    alias: Gate - Open for too long
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.YOUR_CONTACT_SENSOR
        to: "on"
        for: "00:30:00"   # adjust to YOUR_ALERT_DURATION
    action:
      - service: notifications_manager.notify
        data:
          title: "Gate open"
          message: >
            The gate has been open for more than 30 minutes.
          category: alert
          module: gate


########################
# LOVELACE USAGE
########################
# Once installed, reference the alert sensor in portail-badge:
#
#   type: custom:portail-badge
#   contact_entity: binary_sensor.YOUR_CONTACT_SENSOR
#   alert_entity: binary_sensor.gate_open_alert
#   name: Gate
